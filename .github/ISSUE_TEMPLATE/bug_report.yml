name: Bug report
description: Report a reproducible problem in WETT
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version and build
    validations:
      required: true
  - type: input
    id: powershell
    attributes:
      label: PowerShell version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or error output
      description: Remove usernames, IP addresses, serial numbers, and other sensitive data.
