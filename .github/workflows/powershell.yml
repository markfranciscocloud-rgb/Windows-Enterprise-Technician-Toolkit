name: PowerShell Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install test dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module Pester -Scope CurrentUser -Force -MinimumVersion 5.5.0

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error,Warning
          $results | Format-Table -AutoSize
          if ($results) { throw 'PSScriptAnalyzer found errors or warnings.' }

      - name: Run Pester
        shell: pwsh
        run: |
          $configuration = New-PesterConfiguration
          $configuration.Run.Path = './Tests'
          $configuration.Run.Exit = $true
          $configuration.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $configuration
